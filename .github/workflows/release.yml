name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
        env:
          LOOPER_CHANNEL: stable
      - name: Package
        shell: bash
        run: |
          for bin in looperd looper-cli looper-net; do
            src="target/${{ matrix.target }}/release/$bin"
            [ -f "$src" ] || continue
            mkdir -p dist
            out="dist/${bin}-${{ matrix.suffix }}"
            cp "$src" "$out"
            sha256sum "$out" > "${out}.sha256"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.suffix }}
          path: dist/*
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Prepare assets
        run: |
          mkdir -p assets
          find . -type f \( -name "*.sha256" -o -name "looper-*" \) -exec cp {} assets/ \;
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assets/*
