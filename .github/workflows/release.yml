name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: contains(matrix.target, 'linux-musl')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build looperd (musl)
        if: contains(matrix.target, 'linux-musl')
        run: cross build --release -p looperd --target ${{ matrix.target }}
      - name: Build looper-cli (musl)
        if: contains(matrix.target, 'linux-musl')
        run: cross build --release -p looper-cli --target ${{ matrix.target }}

      - name: Build looperd (native)
        if: "!contains(matrix.target, 'linux-musl')"
        run: cargo build --release -p looperd --target ${{ matrix.target }}
      - name: Build looper-cli (native)
        if: "!contains(matrix.target, 'linux-musl')"
        run: cargo build --release -p looper-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar czf ../../../dist/looper-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz \
            looperd looper-cli
          cd -
          cd dist
          sha256sum looper-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz > looper-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist -Force
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path looperd.exe,looper-cli.exe -DestinationPath ../../dist/looper-${{ github.ref_name }}-${{ matrix.suffix }}.zip
          cd -

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            looper-*.tar.gz
            looper-*.zip
            looper-*.sha256
          generate_release_notes: true
          make_latest: true
