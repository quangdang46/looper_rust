# Keep clippy from getting too creative — strict, no nonsense.
allowed-duplicate-crates = ["serde"]
disallowed-methods = [
    { path = "std::process::Command::new", reason = "Use tokio::process::Command for async safety" },
]
doc-valid-idents = ["warn"]
enum-variant-size-threshold = 200
type-complexity-threshold = 250
cognitive-complexity-threshold = 25
